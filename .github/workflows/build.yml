name: Build

on:
  workflow_dispatch:
    inputs:
      cx_version:
        description: CrossOver source version
        default: "26.2.0"
      build_tag:
        description: Release tag pinned by the app
        default: "v1"

# macos-14 is arm64 but ships Xcode 15.4 (clang 15), which does not have the Xcode 16+ integrated
# assembler check that breaks Wine's signal_x86_64.c ("non-private labels ... .cfi_startproc"). It is
# a standard runner, so it is free and plentiful on public repos. We build
# the x86_64 Wine under Rosetta with an x86_64 Homebrew, the same way it is built locally.
jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180
    env:
      CX_VERSION: ${{ github.event.inputs.cx_version || '26.2.0' }}
      BUILD_TAG: ${{ github.event.inputs.build_tag || 'v1' }}
      HOMEBREW_PREFIX: /usr/local
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4 (clang 15, no cfi assembler check)
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Rosetta
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Install x86_64 Homebrew
        run: arch -x86_64 /bin/bash -c "NONINTERACTIVE=1 $(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

      - name: Install x86_64 build dependencies
        # The runner pre-installs a Python framework whose /usr/local/bin symlinks (idle3, 2to3, ...)
        # collide with Homebrew's python (pulled in by gstreamer) and break `brew link`. Documented
        # GitHub Actions fix (actions/runner-images #8529, #9966): delete those framework symlinks
        # first, then install with --overwrite so any remaining collision is resolved.
        # NOTE: no mingw-w64 here - the PE cross-compiler is the pinned xPack GCC that build-wine.sh
        # downloads (version set by MINGW_GCC_VERSION in the script; Homebrew's mingw-w64 would track
        # whatever GCC is current, defeating the pin).
        env:
          HOMEBREW_NO_ENV_HINTS: "1"
        run: |
          find /usr/local/bin -lname '*/Library/Frameworks/Python.framework/*' -delete 2>/dev/null || true
          arch -x86_64 /usr/local/bin/brew install --overwrite bison flex pkg-config \
                       freetype gnutls gstreamer sdl2 faudio mpg123 libpng vulkan-loader

      # Cache the 150+ MB CrossOver source tarball so re-runs skip the download (build-wine.sh reuses it).
      - name: Cache CrossOver source
        uses: actions/cache@v4
        with:
          path: /tmp/crossover-sources-${{ env.CX_VERSION }}.tar.gz
          key: crossover-src-${{ env.CX_VERSION }}

      - name: Build Wine
        run: arch -x86_64 env HOMEBREW_PREFIX=/usr/local ./build-wine.sh

      - uses: actions/upload-artifact@v4
        with:
          name: gamemachine-wine
          path: gamemachine-wine-*.tar.xz
          retention-days: 14

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$BUILD_TAG" >/dev/null 2>&1 || gh release create "$BUILD_TAG" \
            --title "$BUILD_TAG" \
            --notes "Wine built from CrossOver source for GameMachine."
          gh release upload "$BUILD_TAG" gamemachine-wine-*.tar.xz --clobber
